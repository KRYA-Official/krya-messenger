<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messanger - दुनिया की पहचान</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b1120; color: white; }
        .container { max-width: 500px; margin: auto; background: #0f172a; min-height: 100vh; position: relative; padding-bottom: 220px; }
        .header { padding: 40px 20px 20px; text-align: center; background: #0f172a; }
        .brand-name { font-size: 32px; font-weight: bold; color: #fbbf24; letter-spacing: 3px; }
        .tagline { font-size: 14px; color: #fbbf24; margin-top: 10px; opacity: 0.8; }
        .user-list { padding: 10px 15px; }
        .user-card { display: flex; align-items: center; background: white; color: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .user-img { width: 50px; height: 50px; border-radius: 50%; background: #fbbf24; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0f172a; border: 2px solid #0f172a; }
        .user-details { flex-grow: 1; }
        .user-details b { font-size: 16px; display: block; color: #0f172a; }
        .user-details p { font-size: 13px; color: #475569; }
        .v-check { color: #10b981; margin-left: auto; font-size: 20px; }
        .input-box { position: fixed; bottom: 85px; width: 100%; max-width: 500px; background: #1e293b; padding: 15px; border-radius: 25px 25px 0 0; z-index: 10; }
        #userComment { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; resize: none; }
        #sendBtn { width: 100%; background: #fbbf24; color: #0f172a; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #e2e8f0; z-index: 20; }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand-name">KRYA</div>
        <div style="color: #94a3b8; font-size: 18px;">Messanger</div>
        <div class="tagline">दुनिया की एक पहचान</div>
    </div>

    <div class="user-list" id="globalFeed"></div>

    <div class="input-box">
        <textarea id="userComment" rows="2" placeholder="अपनी राय या मैसेज यहाँ लिखें..."></textarea>
        <button id="sendBtn">Global Feed में भेजें</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><i class="fas fa-globe"></i>Global Feed</div>
        <div class="nav-item"><i class="fas fa-users"></i>My Family</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i>Rewards</div>
        <div class="nav-item"><i class="fas fa-user-circle"></i>My Account</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtSIGAybHuIga19QpPRS1egRrsbhvJV2c",
        authDomain: "krya-94e55.firebaseapp.com",
        projectId: "krya-94e55",
        storageBucket: "krya-94e55.firebasestorage.app",
        databaseURL: "https://krya-94e55-default-rtdb.firebaseio.com",
        messagingSenderId: "1025043894227",
        appId: "1:1025043894227:web:fa57c21ed2f6381a792926"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const feedContainer = document.getElementById('globalFeed');

    // 1. रिफ्रेश के बाद पुराने मैसेज लोड करना
    onValue(ref(database, 'comments'), (snapshot) => {
        feedContainer.innerHTML = ''; 
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            const cardHtml = `
                <div class="user-card">
                    <div class="user-img">K</div>
                    <div class="user-details">
                        <b>@KRYA_User</b>
                        <p>${data.text}</p>
                    </div>
                    <i class="fas fa-check-circle v-check"></i>
                </div>`;
            feedContainer.insertAdjacentHTML('afterbegin', cardHtml);
        });
    });

    // 2. नया मैसेज भेजना
    document.getElementById('sendBtn').onclick = function() {
        const text = document.getElementById('userComment').value;
        if(text.trim() === "") return;
        push(ref(database, 'comments'), { text: text, user: "KRYA_User", timestamp: Date.now() });
        document.getElementById('userComment').value = "";
    };
</script>

</body>
</html>
