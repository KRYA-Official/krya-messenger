<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messanger - Final UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0b1120; color: white; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; background: #0f172a; min-height: 100vh; position: relative; padding-bottom: 250px; }
        
        /* Header */
        .header { padding: 40px 20px; text-align: center; background: #0f172a; }
        .brand-name { font-size: 32px; font-weight: bold; color: #fbbf24; letter-spacing: 3px; }
        .tagline { font-size: 14px; color: #94a3b8; margin-top: 5px; }

        /* Feed List */
        .user-list { padding: 15px; }
        .user-card { display: flex; align-items: center; background: white; color: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .user-img { width: 50px; height: 50px; border-radius: 50%; background: #fbbf24; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0f172a; }
        .user-details { flex-grow: 1; }
        .user-details b { font-size: 16px; display: block; }
        .v-check { color: #10b981; margin-left: auto; font-size: 20px; }

        /* --- यहाँ है आपका गोल प्लस (+) बटन --- */
        .floating-plus {
            position: fixed;
            right: 20px;
            bottom: 100px; /* 5 बटनों के ठीक ऊपर */
            width: 60px;
            height: 60px;
            background: #0f172a;
            color: #fbbf24;
            border: 3px solid #fbbf24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* इनपुट सेक्शन */
        .input-area { position: fixed; bottom: 80px; width: 100%; max-width: 500px; background: #1e293b; padding: 15px; border-radius: 25px 25px 0 0; z-index: 10; left: 50%; transform: translateX(-50%); }
        textarea { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; resize: none; }
        .send-btn { width: 100%; background: #fbbf24; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* --- नीचे के 5 बटन (इमेज के अनुसार) --- */
        .nav-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            max-width: 500px; 
            background: white; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid #e2e8f0; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
        }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand-name">KRYA</div>
        <div class="tagline">दुनिया की एक पहचान</div>
    </div>

    <div class="user-list">
        <div class="user-card">
            <div class="user-img">M</div>
            <div class="user-details">
                <b>@Mukesh_Jee_KRYA</b>
                <p style="font-size: 12px; color: #64748b;">KRYA Messanger में आपका स्वागत है</p>
            </div>
            <i class="fas fa-check-circle v-check"></i>
        </div>
    </div>

    <div class="floating-plus" onclick="alert('नया मैसेज लिखें')">
        <i class="fas fa-plus"></i>
    </div>

    <div class="input-area">
        <textarea id="msgInput" rows="2" placeholder="ग्लोबल Feed में कुछ लिखें..."></textarea>
        <button class="send-btn">भेजें (Send)</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><i class="fas fa-globe"></i>Global Feed</div>
        <div class="nav-item"><i class="fas fa-users"></i>My Family</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i>Rewards</div>
        <div class="nav-item"><i class="fas fa-search"></i>Explore</div> <div class="nav-item"><i class="fas fa-user-circle"></i>My Account</div>
    </div>
</div>

</body>
</html>
