<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messanger - दुनिया की पहचान</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b1120; color: white; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; background: #0f172a; min-height: 100vh; position: relative; padding-bottom: 220px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* Header Section */
        .header { padding: 40px 20px 20px; text-align: center; background: #0f172a; }
        .brand-name { font-size: 32px; font-weight: bold; color: #fbbf24; letter-spacing: 3px; }
        .brand-sub { font-size: 18px; color: #94a3b8; }
        .tagline { font-size: 14px; color: #fbbf24; margin-top: 10px; opacity: 0.8; }

        /* Feed Section */
        .user-list { padding: 10px 15px; }
        .user-card { display: flex; align-items: center; background: white; color: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 15px; animation: slideIn 0.3s ease-out; }
        .user-img { width: 50px; height: 50px; border-radius: 50%; background: #e2e8f0; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fbbf24; }
        .user-details { flex-grow: 1; }
        .user-details b { font-size: 16px; display: block; color: #0f172a; }
        .user-details p { font-size: 13px; color: #475569; margin-top: 2px; }
        .v-check { color: #10b981; margin-left: auto; font-size: 20px; }

        /* Input Floating Section */
        .input-box { position: fixed; bottom: 85px; width: 100%; max-width: 500px; background: #1e293b; padding: 15px; border-radius: 25px 25px 0 0; border-top: 1px solid #334155; z-index: 10; }
        #userComment { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; resize: none; font-size: 14px; }
        #sendBtn { width: 100%; background: #fbbf24; color: #0f172a; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        #sendBtn:active { transform: scale(0.98); }

        /* Bottom Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #e2e8f0; z-index: 20; }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #0f172a; font-weight: bold; }

        /* Add Plus Button */
        .plus-btn { position: absolute; right: 20px; bottom: 170px; background: #0f172a; color: #fbbf24; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 3px solid #fbbf24; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 5; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand-name">KRYA</div>
        <div class="brand-sub">Messanger</div>
        <div class="tagline">दुनिया की एक पहचान</div>
    </div>

    <div class="user-list" id="globalFeed">
        <div class="user-card">
            <div class="user-img" style="background: #fbbf24; color: #0f172a;">M</div>
            <div class="user-details">
                <b>@Mukesh_Jee_KRYA</b>
                <p>हेलो दोस्तों! KRYA प्लेटफॉर्म पर आपका स्वागत है।</p>
            </div>
            <i class="fas fa-check-circle v-check"></i>
        </div>
    </div>

    <div class="plus-btn"><i class="fas fa-plus"></i></div>

    <div class="input-box">
        <textarea id="userComment" rows="2" placeholder="अपनी राय या मैसेज यहाँ लिखें..."></textarea>
        <button id="sendBtn">Global Feed में भेजें</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="alert('Global Feed active')"><i class="fas fa-globe"></i>Global Feed</div>
        <div class="nav-item" onclick="alert('My Family जल्द आ रहा है')"><i class="fas fa-users"></i>My Family</div>
        <div class="nav-item" onclick="alert('Rewards सेक्शन सक्रिय हो रहा है')"><i class="fas fa-shield-alt"></i>Rewards</div>
        <div class="nav-item" onclick="alert('प्रोफाइल सेटिंग')"><i class="fas fa-user-circle"></i>My Account</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtSIGAybHuIga19QpPRS1egRrsbhvJV2c",
        authDomain: "krya-94e55.firebaseapp.com",
        projectId: "krya-94e55",
        storageBucket: "krya-94e55.firebasestorage.app",
        databaseURL: "https://krya-94e55-default-rtdb.firebaseio.com",
        messagingSenderId: "1025043894227",
        appId: "1:1025043894227:web:fa57c21ed2f6381a792926"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const feedContainer = document.getElementById('globalFeed');

    // मैसेज भेजने का लॉजिक
    document.getElementById('sendBtn').onclick = function() {
        const text = document.getElementById('userComment').value;
        if(text.trim() === "") {
            alert("कृपया कुछ लिखें!");
            return;
        }
        push(ref(database, 'comments'), {
            text: text,
            user: "Global_User",
            timestamp: Date.now()
        });
        document.getElementById('userComment').value = "";
    };

    // रियल-टाइम मैसेज लोड करने का लॉजिक
    onChildAdded(ref(database, 'comments'), (snapshot) => {
        const data = snapshot.val();
        const firstLetter = data.user.charAt(0).toUpperCase();
        const cardHtml = `
            <div class="user-card">
                <div class="user-img" style="background: #e2e8f0; color: #0f172a;">${firstLetter}</div>
                <div class="user-details">
                    <b>@${data.user}</b>
                    <p>${data.text}</p>
                </div>
                <i class="fas fa-check-circle v-check" style="color: #cbd5e1;"></i>
            </div>`;
        feedContainer.insertAdjacentHTML('afterbegin', cardHtml);
    });
</script>

</body>
</html>
