<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b1120; color: white; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; margin: 100px auto; text-align: center; border: 2px solid #fbbf24; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b1120; color: white; outline: none; }
        .auth-btn { background: #fbbf24; color: #0f172a; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .auth-btn:hover { background: #eab308; }
        .container { max-width: 500px; margin: auto; background: #0f172a; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* Premium Header Design */
        .app-header { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fbbf24; position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 1.4rem; font-weight: bold; color: #fbbf24; letter-spacing: 2px; text-transform: uppercase; }
        .header-icon { color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .header-icon:hover { color: #fbbf24; }

        #feed-list { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: thin; }
        .input-area { background: #1e293b; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        textarea { flex: 1; background: #0b1120; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; resize: none; height: 45px; outline: none; }
        .send-btn { background: #fbbf24; border: none; width: 55px; border-radius: 10px; color: #0f172a; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-box">
    <h2 id="auth-title" style="color:#fbbf24; margin-bottom: 15px;">KRYA Login</h2>
    <input type="text" id="full-name" placeholder="आपका पूरा नाम">
    <input type="tel" id="mobile-number" placeholder="मोबाइल नंबर">
    <input type="email" id="email-field" placeholder="ईमेल आईडी">
    <input type="password" id="pass-field" placeholder="पासवर्ड">
    <button class="auth-btn" id="signup-btn">साइन-अप करें</button>
    <button class="auth-btn" style="background:#334155; margin-top:10px; color:white;" id="login-btn">लॉगिन</button>
</div>

<div id="handle-screen" class="auth-box hidden">
    <h2 style="color:#fbbf24;">KRYA हैंडल चुनें</h2>
    <p style="font-size: 12px; margin-bottom: 10px;">अपनी पहचान बनाएँ (उदा: @mukesh)</p>
    <input type="text" id="username-field" placeholder="username">
    <button class="auth-btn" id="save-handle-btn">हैंडल सेव करें</button>
</div>

<div id="main-app" class="container hidden">
    <div class="app-header">
        <i class="fas fa-bars header-icon" id="menu-btn"></i>
        <div class="brand-name">KRYA</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <i class="fas fa-search header-icon"></i>
            <i class="fas fa-sign-out-alt header-icon" id="logout-btn" style="color: #ff4d4d;"></i>
        </div>
    </div>
    <div id="feed-list"></div>
    <div class="input-area">
        <textarea id="msgInput" placeholder="अपना संदेश लिखें..."></textarea>
        <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtSIGAybHuIga19QpPRS1egRrsbhvJV2c",
        authDomain: "krya-94e55.firebaseapp.com",
        projectId: "krya-94e55",
        storageBucket: "krya-94e55.firebasestorage.app",
        messagingSenderId: "1025043894227",
        appId: "1:1025043894227:web:fa57c21ed2f6381a792926",
        measurementId: "G-VMC9CDSCXK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    

    // --- 1. साइन-अप लॉजिक ---
    document.getElementById('signup-btn').addEventListener('click', async () => {
        const name = document.getElementById('full-name').value;
        const mobile = document.getElementById('mobile-number').value;
        const email = document.getElementById('email-field').value.trim();
        const pass = document.getElementById('pass-field').value;

        if (!name || !email || !pass) { alert("कृपया पूरी जानकारी भरें"); return; }

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await sendEmailVerification(userCred.user);
            alert("वेरिफिकेशन लिंक ईमेल पर भेजा गया!");

            await setDoc(doc(db, "users", userCred.user.uid), {
                fullName: name, phone: mobile, email: email, uid: userCred.user.uid
            });

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('handle-screen').classList.remove('hidden');
        } catch (e) { alert("साइन-अप एरर: " + e.message); }
    });

    // --- 2. लॉगिन लॉजिक (सुपर फिक्स) ---
    document.getElementById('login-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        const nameField = document.getElementById('full-name');
        const mobileField = document.getElementById('mobile-number');
        const signupBtn = document.getElementById('signup-btn');
        const emailField = document.getElementById('email-field');
        const passField = document.getElementById('pass-field');

        // अगर नाम वाला बॉक्स 'hidden' नहीं है, तो उसे छुपाकर लॉगिन मोड सक्रिय करें
        if (!nameField.classList.contains('hidden')) {
            nameField.classList.add('hidden');
            mobileField.classList.add('hidden');
            signupBtn.classList.add('hidden');
            document.getElementById('auth-title').innerText = "KRYA Login Mode";
            return;
        }

        const email = emailField.value.trim();
        const pass = passField.value;
        if (!email || !pass) { alert("ईमेल और पासवर्ड भरें!"); return; }

        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            if (!userCred.user.emailVerified) {
                alert("कृपया पहले ईमेल वेरीफाई करें!");
                await signOut(auth);
            }
        } catch (error) { alert("लॉगिन एरर: " + error.message); }
    });

    // --- 3. हैंडल सेव लॉजिक (UNIQUE CHECK FIXED) ---
    document.getElementById('save-handle-btn').addEventListener('click', async () => {
        const handle = document.getElementById('username-field').value.trim().toLowerCase();
        if (handle && auth.currentUser) {
            try {
                // पहले चेक करें कि क्या यह हैंडल किसी और ने लिया है
                const handleRef = doc(db, "handles", handle);
                const handleSnap = await getDoc(handleRef); 

                if (handleSnap.exists()) {
                    alert("यह हैंडल पहले से बुक है! कृपया दूसरा चुनें।");
                } else {
                    // हैंडल को रिजर्व करें और यूजर प्रोफाइल अपडेट करें
                    await setDoc(handleRef, { uid: auth.currentUser.uid });
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { handle: "@" + handle });
                    alert("बधाई हो! आपका यूनिक KRYA हैंडल @" + handle + " तैयार है।");
                    location.reload(); 
                }
            } catch (e) { alert("हैंडल एरर: " + e.message); }
        }
    });

    // --- 4. मैसेज भेजना (STORAGE MANAGER ENABLED) ---
    document.getElementById('send-btn').addEventListener('click', async () => {
        const text = document.getElementById('msgInput').value;
        if (text.trim() !== "" && auth.currentUser) {
            // 48 घंटे बाद का समय सेट करें (Storage को खाली रखने के लिए)
            const expiryTime = Date.now() + (48 * 60 * 60 * 1000); 

            await addDoc(collection(db, "messages"), {
                text: text,
                user: auth.currentUser.email.split('@')[0],
                createdAt: serverTimestamp(),
                expiresAt: expiryTime // यह मैनेजर को बताएगा कि कब डिलीट करना है
            });
            document.getElementById('msgInput').value = '';
        }
    });


    // --- 5. ऑथेंटिकेशन स्थिति चेक करना ---
    onAuthStateChanged(auth, (user) => {
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const handleScreen = document.getElementById('handle-screen');

        if (user && user.emailVerified) {
            authScreen.classList.add('hidden');
            handleScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            loadMessages();
        } else {
            authScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');
        }
    });

    // --- 6. मैसेज लोड करना ---
    function loadMessages() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            const feedList = document.getElementById('feed-list');
            feedList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.style = "background:#1e293b; padding:10px; border-radius:10px; margin-bottom:10px; border-left: 3px solid #fbbf24;";
                card.innerHTML = `<small style="color:#fbbf24;">@${data.user}</small><p style="margin-top:5px;">${data.text}</p>`;
                feedList.appendChild(card);
            });
            feedList.scrollTop = feedList.scrollHeight;
        });
    }

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
