<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messanger - Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0b1120; color: white; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; background: #0f172a; min-height: 100vh; position: relative; padding-bottom: 250px; }
        
        /* Top Header with Three Lines */
        .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; background: #0f172a; border-bottom: 1px solid #1e293b; }
        .menu-icon { font-size: 24px; color: #fbbf24; cursor: pointer; }
        .brand-name { font-size: 24px; font-weight: bold; color: #fbbf24; letter-spacing: 2px; flex-grow: 1; text-align: center; }

        /* --- Side Navigation Bar --- */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1e293b; transition: 0.3s; z-index: 1000; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .sidebar h2 { color: #fbbf24; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .sidebar-item { padding: 15px 0; border-bottom: 1px solid #334155; display: flex; align-items: center; cursor: pointer; color: #d1d5db; }
        .sidebar-item i { margin-right: 15px; width: 20px; color: #fbbf24; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* Feed List */
        .user-list { padding: 15px; }
        .user-card { display: flex; align-items: center; background: white; color: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .user-img { width: 45px; height: 45px; border-radius: 50%; background: #fbbf24; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .v-check { color: #10b981; margin-left: auto; font-size: 18px; }

        /* Floating Plus Button */
        .floating-plus { position: fixed; right: 20px; bottom: 100px; width: 60px; height: 60px; background: #0f172a; color: #fbbf24; border: 3px solid #fbbf24; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 99; }

        /* Input Section */
        .input-area { position: fixed; bottom: 80px; width: 100%; max-width: 500px; background: #1e293b; padding: 15px; border-radius: 25px 25px 0 0; z-index: 10; left: 50%; transform: translateX(-50%); }
        textarea { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; resize: none; }
        .send-btn { width: 100%; background: #fbbf24; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Bottom 5 Buttons */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 12px 0; left: 50%; transform: translateX(-50%); z-index: 100; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <h2>KRYA Menu</h2>
    <div class="sidebar-item"><i class="fas fa-user-edit"></i> Edit Profile</div>
    <div class="sidebar-item"><i class="fas fa-cog"></i> Settings</div>
    <div class="sidebar-item"><i class="fas fa-wallet"></i> My Earnings</div>
    <div class="sidebar-item"><i class="fas fa-shield-alt"></i> Privacy</div>
    <div class="sidebar-item" style="margin-top: 50px; color: #f87171;"><i class="fas fa-sign-out-alt"></i> Logout</div>
</div>

<div class="container">
    <div class="header">
        <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
        <div class="brand-name">KRYA</div>
        <i class="fas fa-search" style="font-size: 20px; color: #fbbf24;"></i>
    </div>

    <div class="user-list">
        <div class="user-card">
            <div class="user-img">M</div>
            <div class="user-details">
                <b>@Mukesh_Jee_KRYA</b>
                <p style="font-size: 12px; color: #64748b;">आज का मिशन: ₹7 लाख कर्ज मुक्त!</p>
            </div>
            <i class="fas fa-check-circle v-check"></i>
        </div>
    </div>

    <div class="floating-plus" onclick="alert('नया संदेश पोस्ट करें')">
        <i class="fas fa-plus"></i>
    </div>

    <div class="input-area">
        <textarea id="msgInput" rows="2" placeholder="ग्लोबल Feed में कुछ लिखें..."></textarea>
        <button class="send-btn">भेजें (Send)</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><i class="fas fa-globe"></i>Global</div>
        <div class="nav-item"><i class="fas fa-users"></i>Family</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i>Rewards</div>
        <div class="nav-item"><i class="fas fa-search"></i>Explore</div>
        <div class="nav-item"><i class="fas fa-user-circle"></i>Account</div>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
</script>

</body>
</html>
