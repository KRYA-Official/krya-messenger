<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0b1120; color: white; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; margin: 100px auto; text-align: center; border: 2px solid #fbbf24; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b1120; color: white; }
        .auth-btn { background: #fbbf24; color: #0f172a; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .container { max-width: 500px; margin: auto; background: #0f172a; height: 100vh; display: flex; flex-direction: column; }
        #feed-list { flex: 1; overflow-y: auto; padding: 15px; }
        .input-area { background: #1e293b; padding: 15px; display: flex; gap: 10px; }
        textarea { flex: 1; background: #0b1120; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; resize: none; }
        .send-btn { background: #fbbf24; border: none; width: 50px; border-radius: 10px; color: #0f172a; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:#fbbf24;">KRYA Login</h2>
        <input type="email" id="email-field" placeholder="ईमेल आईडी">
        <input type="password" id="pass-field" placeholder="पासवर्ड">
        <button class="auth-btn" id="signup-btn">Sign Up</button>
        <button class="auth-btn" style="background:#334155; color:white; margin-top:10px;" id="login-btn">Login</button>
    </div>
</div>

<div class="container hidden" id="main-app">
    <div style="padding:15px; background:#1e293b; border-bottom:1px solid #334155; display:flex; justify-content:space-between;">
        <b style="color:#fbbf24;">KRYA Messenger</b>
        <button id="logout-btn" style="background:none; border:none; color:#f87171;"><i class="fas fa-sign-out-alt"></i></button>
    </div>
    <div id="feed-list"></div>
    <div class="input-area">
        <textarea id="msgInput" placeholder="संदेश लिखें..."></textarea>
        <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtSIGAybHuIga19QpPRS1egRrsbhvJV2c",
      authDomain: "krya-94e55.firebaseapp.com",
      projectId: "krya-94e55",
      storageBucket: "krya-94e55.firebasestorage.app",
      messagingSenderId: "1025043894227",
      appId: "1:1025043894227:web:fa57c21ed2f6381a792926"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- बटन के तार जोड़ना (Event Listeners) ---
    document.getElementById('signup-btn').addEventListener('click', async () => {
        const email = document.getElementById('email-field').value;
        const pass = document.getElementById('pass-field').value;
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await sendEmailVerification(userCred.user);
            alert("ईमेल वेरिफाई करें! लिंक भेज दिया गया है।");
        } catch (e) { alert("Error: " + e.message); }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('email-field').value;
        const pass = document.getElementById('pass-field').value;
        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            if(!userCred.user.emailVerified) { alert("ईमेल वेरिफाई करें!"); await signOut(auth); }
        } catch (e) { alert("Error: " + e.message); }
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    document.getElementById('send-btn').addEventListener('click', async () => {
        const text = document.getElementById('msgInput').value;
        if(text.trim() !== "") {
            await addDoc(collection(db, "messages"), {
                text: text,
                user: auth.currentUser.email.split('@')[0],
                createdAt: serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        }
    });

    onAuthStateChanged(auth, (user) => {
        if (user && user.emailVerified) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadMessages();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    function loadMessages() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            const feedList = document.getElementById('feed-list');
            feedList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.style = "background:#1e293b; padding:10px; border-radius:10px; margin-bottom:10px; border-left:4px solid #fbbf24;";
                card.innerHTML = `<b>@${data.user}</b><p>${data.text}</p>`;
                feedList.appendChild(card);
                feedList.scrollTop = feedList.scrollHeight;
            });
        });
    }
</script>
</body>
</html>
