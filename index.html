<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messanger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0b1120; color: white; margin: 0; padding-bottom: 200px; }
        .header { text-align: center; padding: 30px; background: #0f172a; border-bottom: 2px solid #fbbf24; }
        .brand { font-size: 30px; font-weight: bold; color: #fbbf24; }
        
        /* मैसेज दिखने की जगह */
        #globalFeed { padding: 15px; }
        .msg-card { background: white; color: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; }
        .user-icon { width: 40px; height: 40px; background: #fbbf24; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-weight: bold; }

        /* इनपुट बॉक्स */
        .input-area { position: fixed; bottom: 80px; width: 100%; max-width: 500px; background: #1e293b; padding: 15px; border-radius: 20px 20px 0 0; }
        textarea { width: 100%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: #fbbf24; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* नीचे के 4 बटन */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-btn { color: #64748b; text-align: center; font-size: 12px; cursor: pointer; flex: 1; }
        .nav-btn i { font-size: 20px; display: block; }
        .nav-btn.active { color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">KRYA</div>
    <div style="color: #94a3b8;">Messanger</div>
</div>

<div id="globalFeed">
    <p style="text-align:center; color:#94a3b8;">मैसेज लोड हो रहे हैं...</p>
</div>

<div class="input-area">
    <textarea id="userMsg" rows="2" placeholder="अपनी राय लिखें..."></textarea>
    <button id="sendBtn">Global Feed में भेजें</button>
</div>

<div class="nav-bar">
    <div class="nav-btn active" onclick="alert('आप Global Feed पर हैं')"><i class="fas fa-globe"></i>Global Feed</div>
    <div class="nav-btn" onclick="alert('My Family जल्द आएगा')"><i class="fas fa-users"></i>My Family</div>
    <div class="nav-btn" onclick="alert('Rewards जल्द आएगा')"><i class="fas fa-shield-alt"></i>Rewards</div>
    <div class="nav-btn" onclick="alert('My Account जल्द आएगा')"><i class="fas fa-user-circle"></i>My Account</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // आपका Firebase Config (स्क्रीनशॉट के अनुसार)
    const firebaseConfig = {
        apiKey: "AIzaSyCtSIGAybHuIga19QpPRS1egRrsbhvJV2c",
        authDomain: "krya-94e55.firebaseapp.com",
        projectId: "krya-94e55",
        storageBucket: "krya-94e55.firebasestorage.app",
        databaseURL: "https://krya-94e55-default-rtdb.firebaseio.com",
        messagingSenderId: "1025043894227",
        appId: "1:1025043894227:web:fa57c21ed2f6381a792926"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const feed = document.getElementById('globalFeed');

    // 1. डेटाबेस से मैसेज पढ़ना (Load Messages)
    onValue(ref(database, 'messages'), (snapshot) => {
        feed.innerHTML = ''; 
        if (!snapshot.exists()) {
            feed.innerHTML = '<p style="text-align:center;">कोई मैसेज नहीं है।</p>';
            return;
        }
        snapshot.forEach((child) => {
            const data = child.val();
            feed.insertAdjacentHTML('afterbegin', `
                <div class="msg-card">
                    <div class="user-icon">M</div>
                    <div>
                        <b>@Mukesh_Jee</b>
                        <p style="margin:5px 0 0;">${data.text}</p>
                    </div>
                </div>
            `);
        });
    });

    // 2. बटन दबाने पर मैसेज भेजना
    document.getElementById('sendBtn').onclick = function() {
        const text = document.getElementById('userMsg').value;
        if(text.trim() === "") return;

        push(ref(database, 'messages'), {
            text: text,
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('userMsg').value = "";
        }).catch((err) => {
            alert("Error: " + err.message);
        });
    };
</script>

</body>
</html>
