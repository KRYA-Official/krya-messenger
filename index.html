<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0b1120; color: white; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; margin: 100px auto; text-align: center; border: 2px solid #fbbf24; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0b1120; color: white; }
        .auth-btn { background: #fbbf24; color: #0f172a; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .container { max-width: 500px; margin: auto; background: #0f172a; height: 100vh; display: flex; flex-direction: column; }
        #feed-list { flex: 1; overflow-y: auto; padding: 15px; }
        .input-area { background: #1e293b; padding: 15px; display: flex; gap: 10px; }
        textarea { flex: 1; background: #0b1120; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; resize: none; }
        .send-btn { background: #fbbf24; border: none; width: 50px; border-radius: 10px; color: #0f172a; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-box">
    <h2 style="color:#fbbf24;">KRYA Login</h2>
    <input type="text" id="full-name" placeholder="आपका पूरा नाम">
    <input type="tel" id="mobile-number" placeholder="मोबाइल नंबर">
    <input type="email" id="email-field" placeholder="ईमेल आईडी">
    <input type="password" id="pass-field" placeholder="पासवर्ड">
    <button class="auth-btn" id="signup-btn">साइन-अप करें</button>
    <button class="auth-btn" style="background:#334155; margin-top:10px;" id="login-btn">लॉगिन</button>
</div>

<div id="handle-screen" class="auth-box hidden">
    <h2 style="color:#fbbf24;">KRYA हैंडल चुनें</h2>
    <p style="font-size: 12px; margin-bottom: 10px;">अपनी पहचान बनाएँ (उदा: @mukesh)</p>
    <input type="text" id="username-field" placeholder="username">
    <button class="auth-btn" id="save-handle-btn">हैंडल सेव करें</button>
</div>
    


</div>

<script type="module">

    // 1. Firebase SDK Imports  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, updateDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    
    // 2. Your Firebase Configuration (Updated with Official Key)
    const firebaseConfig = {
        apiKey: "AIzaSyCtSIGAybHuIga19QpPRS1egRrsbhvJV2c",
        authDomain: "krya-94e55.firebaseapp.com",
        projectId: "krya-94e55",
        storageBucket: "krya-94e55.firebasestorage.app",
        messagingSenderId: "1025043894227",
        appId: "1:1025043894227:web:fa57c21ed2f6381a792926",
        measurementId: "G-VMC9CDSCXK"
    };
    
    
    

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. साइन-अप लॉजिक
    document.getElementById('signup-btn').addEventListener('click', async () => {
        const name = document.getElementById('full-name').value;
        const mobile = document.getElementById('mobile-number').value;
        const email = document.getElementById('email-field').value.trim();
        const pass = document.getElementById('pass-field').value;

        if (!name || !email || !pass) { 
            alert("कृपया पूरी जानकारी भरें"); 
            return; 
        }

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await sendEmailVerification(userCred.user);
            alert("वेरिफिकेशन लिंक आपके ईमेल पर भेज दिया गया है!");

            // Firestore में डेटा सेव करना
            await setDoc(doc(db, "users", userCred.user.uid), {
                fullName: name,
                phone: mobile,
                email: email,
                uid: userCred.user.uid,
                isVerified: false
            });

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('handle-screen').classList.remove('hidden');
        } catch (e) {
            alert("KRYA एरर: " + e.message);
    // 2. लॉगिन मोड और लॉगिन प्रोसेस (Super Fixed)
    document.getElementById('login-btn').addEventListener('click', async () => {
        const nameField = document.getElementById('full-name');
        const mobileField = document.getElementById('mobile-number');
        const email = document.getElementById('email-field').value.trim();
        const pass = document.getElementById('pass-field').value;

        // अगर नाम वाला बॉक्स दिख रहा है, तो उसे छुपाकर लॉगिन मोड में बदलें
        if (!nameField.classList.contains('hidden')) {
            nameField.classList.add('hidden');
            mobileField.classList.add('hidden');
            document.querySelector('h2').innerText = "KRYA Login Mode";
            return; 
        }

        // अगर ईमेल या पासवर्ड खाली है
        if (!email || !pass) {
            alert("कृपया ईमेल और पासवर्ड भरें!");
            return;
        }

        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            if (!userCred.user.emailVerified) {
                alert("कृपया ईमेल वेरीफाई करें!");
                await signOut(auth);
            }
        } catch (e) {
            alert("लॉगिन एरर: " + e.message);
        }
    });
            
            alert("लॉगिन एरर: " + e.message);
        }
    });
                

            
        }
    });

    // 3. हैंडल सेव करने का लॉजिक
    document.getElementById('save-handle-btn').addEventListener('click', async () => {
        const handle = document.getElementById('username-field').value.trim();
        if (handle && auth.currentUser) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { 
                handle: "@" + handle 
            });
            alert("आपका KRYA हैंडल @" + handle + " तैयार है!");
            location.reload(); 
        }
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // 4. मैसेजिंग लॉजिक
    document.getElementById('send-btn').addEventListener('click', async () => {
        const text = document.getElementById('msgInput').value;
        if (text.trim() !== "" && auth.currentUser) {
            await addDoc(collection(db, "messages"), {
                text: text,
                user: auth.currentUser.email.split('@')[0],
                createdAt: serverTimestamp()
            });
            document.getElementById('msgInput').value = '';
        }
    });

    // 5. Auth State Change (लॉगिन स्थिति चेक करना)
    onAuthStateChanged(auth, (user) => {
        if (user && user.emailVerified) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('handle-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadMessages();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    function loadMessages() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            const feedList = document.getElementById('feed-list');
            feedList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.style = "background:#1e293b; padding:10px; border-radius:10px; margin-bottom:10px;";
                card.innerHTML = `<b>@${data.user}</b><p>${data.text}</p>`;
                feedList.appendChild(card);
            });
            feedList.scrollTop = feedList.scrollHeight;
        });
    }
</script>
</body>
</html>
